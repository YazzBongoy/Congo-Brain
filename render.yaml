services:
  - type: web
    name: congo-brain
    runtime: docker
    repo: https://github.com/YazzBongoy/Congo-Brain
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////app/congo_brain.db
      - key: ANOMALY_THRESHOLD
        value: "0.7"
      - key: RISK_SCORE_THRESHOLD
        value: "75.0"
    healthCheckPath: /health
    autoDeploy: true
