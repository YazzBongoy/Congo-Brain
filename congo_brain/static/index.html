<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congo-Brain — Plateforme IA de Gouvernance RDC</title>
    <style>
        :root {
            --primary: #1a5276;
            --primary-light: #2980b9;
            --accent: #e67e22;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e0e6ed;
            --success: #27ae60;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 1.2rem 1rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .header p {
            font-size: 0.8rem;
            opacity: 0.85;
        }

        /* Search bar */
        .search-container {
            padding: 0.8rem 1rem;
            background: white;
            border-bottom: 1px solid var(--border);
        }
        .search-box {
            display: flex;
            gap: 0.5rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus {
            border-color: var(--primary-light);
        }
        .search-box button {
            padding: 0.7rem 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .search-box button:active { opacity: 0.8; }

        /* Navigation tabs */
        .nav-tabs {
            display: flex;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
            border-bottom: 2px solid var(--border);
            scrollbar-width: none;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tab {
            flex: 0 0 auto;
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .nav-tab:hover { color: var(--primary-light); }

        /* Content area */
        .content { padding: 0.8rem; max-width: 800px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 0.7rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.1); }
        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }
        .card-subtitle {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.4rem;
        }
        .card-desc {
            font-size: 0.88rem;
            color: var(--text);
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            background: #ebf5fb;
            color: var(--primary-light);
            margin-right: 0.3rem;
            margin-bottom: 0.3rem;
        }
        .badge-accent {
            background: #fef5e7;
            color: var(--accent);
        }

        /* Detail view */
        .detail-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: flex-end;
        }
        .detail-overlay.open {
            display: flex;
        }
        .detail-panel {
            background: white;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            border-radius: 20px 20px 0 0;
            overflow-y: auto;
            padding: 1.2rem;
            animation: slideUp 0.25s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .detail-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }
        .close-btn {
            background: var(--bg);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .detail-section {
            margin-bottom: 1rem;
        }
        .detail-section h3 {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            margin-bottom: 0.4rem;
        }
        .detail-list {
            list-style: none;
            padding: 0;
        }
        .detail-list li {
            padding: 0.4rem 0;
            padding-left: 1.2rem;
            position: relative;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--bg);
        }
        .detail-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.75rem;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary-light);
        }
        .detail-list.numbered li {
            counter-increment: step;
            padding-left: 2rem;
        }
        .detail-list.numbered li::before {
            content: counter(step);
            background: var(--primary);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            top: 0.45rem;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--bg);
            font-size: 0.9rem;
        }
        .info-row .label { color: var(--text-light); font-weight: 500; }
        .info-row .value { font-weight: 600; text-align: right; }

        /* Stats section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.7rem;
            margin-bottom: 1rem;
        }
        .stat-card {
            background: white;
            border-radius: var(--radius);
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
        }

        /* FAQ */
        .faq-card {
            cursor: default;
        }
        .faq-question {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--primary);
            margin-bottom: 0.4rem;
        }
        .faq-answer {
            font-size: 0.88rem;
            color: var(--text);
            line-height: 1.5;
        }

        /* Contact card extras */
        .contact-info {
            margin-top: 0.4rem;
            font-size: 0.82rem;
        }
        .contact-info a {
            color: var(--primary-light);
            text-decoration: none;
        }

        /* Rights card */
        .right-article {
            font-size: 0.78rem;
            color: var(--accent);
            font-weight: 600;
        }

        /* Loading / Empty */
        .loading, .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
        }
        .loading::after {
            content: '';
            display: block;
            width: 30px;
            height: 30px;
            margin: 1rem auto 0;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            text-align: center;
            padding: 1.5rem 1rem;
            color: var(--text-light);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 1rem;
        }

        /* Search results header */
        .results-header {
            padding: 0.5rem 0;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Congo-Brain</h1>
    <p>Plateforme IA de Gouvernance — RDC</p>
</div>

<div class="search-container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Rechercher une procedure, un contact..."
               enterkeyhint="search">
        <button onclick="doSearch()">Rechercher</button>
    </div>
</div>

<nav class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-tab="accueil" onclick="switchTab('accueil')">Accueil</button>
    <button class="nav-tab" data-tab="procedures" onclick="switchTab('procedures')">Procedures</button>
    <button class="nav-tab" data-tab="contacts" onclick="switchTab('contacts')">Contacts</button>
    <button class="nav-tab" data-tab="droits" onclick="switchTab('droits')">Droits</button>
    <button class="nav-tab" data-tab="faq" onclick="switchTab('faq')">FAQ</button>
</nav>

<div class="content">
    <!-- Accueil -->
    <div class="section active" id="section-accueil">
        <div id="statsContainer" class="stats-grid"></div>
        <h2 style="font-size:1rem;margin-bottom:0.5rem;color:var(--primary)">Categories</h2>
        <div id="categoriesContainer"></div>
    </div>

    <!-- Procedures -->
    <div class="section" id="section-procedures">
        <div id="proceduresContainer"><div class="loading">Chargement...</div></div>
    </div>

    <!-- Contacts -->
    <div class="section" id="section-contacts">
        <div id="contactsContainer"><div class="loading">Chargement...</div></div>
    </div>

    <!-- Droits -->
    <div class="section" id="section-droits">
        <div id="droitsContainer"><div class="loading">Chargement...</div></div>
    </div>

    <!-- FAQ -->
    <div class="section" id="section-faq">
        <div id="faqContainer"><div class="loading">Chargement...</div></div>
    </div>

    <!-- Search Results -->
    <div class="section" id="section-search">
        <div id="searchResults"></div>
    </div>

    <div class="footer">
        Congo-Brain v1.0.0<br>
        Republique Democratique du Congo
    </div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
    <div class="detail-panel" id="detailPanel" onclick="event.stopPropagation()"></div>
</div>

<script>
const API = '/api/v1';
let cache = {};

async function fetchAPI(endpoint) {
    if (cache[endpoint]) return cache[endpoint];
    try {
        const res = await fetch(API + endpoint);
        if (!res.ok) throw new Error('Erreur ' + res.status);
        const data = await res.json();
        cache[endpoint] = data;
        return data;
    } catch (e) {
        console.error('API error:', e);
        return null;
    }
}

function switchTab(tab) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + tab).classList.add('active');

    if (tab === 'accueil') loadStats();
    else if (tab === 'procedures') loadProcedures();
    else if (tab === 'contacts') loadContacts();
    else if (tab === 'droits') loadRights();
    else if (tab === 'faq') loadFAQ();
}

async function loadStats() {
    const data = await fetchAPI('/stats');
    if (!data) return;
    document.getElementById('statsContainer').innerHTML = `
        <div class="stat-card"><div class="stat-number">${data.total_procedures}</div><div class="stat-label">Procedures</div></div>
        <div class="stat-card"><div class="stat-number">${data.total_contacts}</div><div class="stat-label">Contacts</div></div>
        <div class="stat-card"><div class="stat-number">${data.total_rights}</div><div class="stat-label">Droits Citoyens</div></div>
        <div class="stat-card"><div class="stat-number">${data.total_faq}</div><div class="stat-label">FAQ</div></div>
    `;
    const cats = data.categories || [];
    document.getElementById('categoriesContainer').innerHTML = cats.map(c =>
        `<span class="badge" style="font-size:0.82rem;padding:0.3rem 0.8rem;margin-bottom:0.4rem;cursor:pointer"
              onclick="filterByCategory('${c}')">${c}</span>`
    ).join('');
}

async function loadProcedures(category) {
    const endpoint = category ? `/procedures?category=${encodeURIComponent(category)}` : '/procedures';
    const data = await fetchAPI(endpoint);
    const container = document.getElementById('proceduresContainer');
    if (!data || !data.procedures.length) {
        container.innerHTML = '<div class="empty-state">Aucune procedure trouvee.</div>';
        return;
    }
    container.innerHTML = data.procedures.map(p => `
        <div class="card" onclick="showProcedure('${p.id}')">
            <div class="card-title">${esc(p.name)}</div>
            <div class="card-subtitle">
                <span class="badge">${esc(p.category)}</span>
                <span class="badge badge-accent">${esc(p.fees)}</span>
            </div>
            <div class="card-desc">${esc(p.description)}</div>
        </div>
    `).join('');
}

async function showProcedure(id) {
    const p = await fetchAPI('/procedures/' + id);
    if (!p) return;
    const panel = document.getElementById('detailPanel');
    panel.innerHTML = `
        <div class="detail-header">
            <div class="detail-title">${esc(p.name)}</div>
            <button class="close-btn" onclick="closeDetail()">&times;</button>
        </div>
        <p style="margin-bottom:1rem;font-size:0.9rem">${esc(p.description)}</p>
        <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:1rem">
            <span class="badge">${esc(p.category)}</span>
            <span class="badge badge-accent">${esc(p.fees)}</span>
        </div>
        <div class="info-row"><span class="label">Autorite</span><span class="value">${esc(p.authority)}</span></div>
        <div class="info-row"><span class="label">Delai</span><span class="value">${esc(p.processing_time)}</span></div>
        <div class="detail-section">
            <h3>Etapes</h3>
            <ol class="detail-list numbered">${p.steps.map(s => `<li>${esc(s)}</li>`).join('')}</ol>
        </div>
        <div class="detail-section">
            <h3>Documents Requis</h3>
            <ul class="detail-list">${p.documents_required.map(d => `<li>${esc(d)}</li>`).join('')}</ul>
        </div>
    `;
    document.getElementById('detailOverlay').classList.add('open');
}

async function loadContacts() {
    const data = await fetchAPI('/contacts');
    const container = document.getElementById('contactsContainer');
    if (!data || !data.contacts.length) {
        container.innerHTML = '<div class="empty-state">Aucun contact trouve.</div>';
        return;
    }
    container.innerHTML = data.contacts.map(c => `
        <div class="card" onclick="showContact('${c.id}')">
            <div class="card-title">${esc(c.institution)}</div>
            <div class="contact-info">
                <div>${esc(c.address)}</div>
                <div><a href="tel:${c.phone}">${esc(c.phone)}</a> &bull;
                     <a href="mailto:${c.email}">${esc(c.email)}</a></div>
                <div style="color:var(--text-light);margin-top:0.2rem">${esc(c.hours)}</div>
            </div>
        </div>
    `).join('');
}

async function showContact(id) {
    const c = await fetchAPI('/contacts/' + id);
    if (!c) return;
    const panel = document.getElementById('detailPanel');
    panel.innerHTML = `
        <div class="detail-header">
            <div class="detail-title">${esc(c.institution)}</div>
            <button class="close-btn" onclick="closeDetail()">&times;</button>
        </div>
        <div class="info-row"><span class="label">Adresse</span><span class="value">${esc(c.address)}</span></div>
        <div class="info-row"><span class="label">Telephone</span><span class="value"><a href="tel:${c.phone}">${esc(c.phone)}</a></span></div>
        <div class="info-row"><span class="label">Email</span><span class="value"><a href="mailto:${c.email}">${esc(c.email)}</a></span></div>
        <div class="info-row"><span class="label">Horaires</span><span class="value">${esc(c.hours)}</span></div>
        <div class="detail-section" style="margin-top:1rem">
            <h3>Services</h3>
            <div style="display:flex;flex-wrap:wrap;gap:0.3rem">${c.services.map(s => `<span class="badge">${esc(s)}</span>`).join('')}</div>
        </div>
    `;
    document.getElementById('detailOverlay').classList.add('open');
}

async function loadRights() {
    const data = await fetchAPI('/rights');
    const container = document.getElementById('droitsContainer');
    if (!data || !data.rights.length) {
        container.innerHTML = '<div class="empty-state">Aucun droit trouve.</div>';
        return;
    }
    container.innerHTML = data.rights.map(r => `
        <div class="card" style="cursor:default">
            <div class="card-title">${esc(r.title)}</div>
            <div class="right-article">${esc(r.article)}</div>
            <span class="badge">${esc(r.category)}</span>
            <div class="card-desc" style="margin-top:0.4rem">${esc(r.description)}</div>
        </div>
    `).join('');
}

async function loadFAQ() {
    const data = await fetchAPI('/faq');
    const container = document.getElementById('faqContainer');
    if (!data || !data.faq.length) {
        container.innerHTML = '<div class="empty-state">Aucune FAQ trouvee.</div>';
        return;
    }
    container.innerHTML = data.faq.map(f => `
        <div class="card faq-card">
            <div class="faq-question">${esc(f.question)}</div>
            <span class="badge" style="margin-bottom:0.4rem">${esc(f.category)}</span>
            <div class="faq-answer">${esc(f.answer)}</div>
        </div>
    `).join('');
}

async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;

    // Show search results section
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-search').classList.add('active');

    const results = document.getElementById('searchResults');
    results.innerHTML = '<div class="loading">Recherche en cours...</div>';

    // Search across all categories in parallel
    const [procs, contacts, rights, faq] = await Promise.all([
        fetchAPI('/procedures/search/?q=' + encodeURIComponent(q)),
        fetchAPI('/contacts/search/?q=' + encodeURIComponent(q)),
        fetchAPI('/rights/search/?q=' + encodeURIComponent(q)),
        fetchAPI('/faq/search/?q=' + encodeURIComponent(q)),
    ]);

    // Clear search cache so new searches work
    delete cache['/procedures/search/?q=' + encodeURIComponent(q)];
    delete cache['/contacts/search/?q=' + encodeURIComponent(q)];
    delete cache['/rights/search/?q=' + encodeURIComponent(q)];
    delete cache['/faq/search/?q=' + encodeURIComponent(q)];

    let html = `<div class="results-header">Resultats pour "<strong>${esc(q)}</strong>"</div>`;
    let total = 0;

    if (procs && procs.results.length) {
        total += procs.results.length;
        html += `<h3 style="font-size:0.9rem;color:var(--primary);margin:0.8rem 0 0.4rem">Procedures (${procs.results.length})</h3>`;
        html += procs.results.map(p => `
            <div class="card" onclick="showProcedure('${p.id}')">
                <div class="card-title">${esc(p.name)}</div>
                <span class="badge">${esc(p.category)}</span>
                <span class="badge badge-accent">${esc(p.fees)}</span>
                <div class="card-desc">${esc(p.description)}</div>
            </div>
        `).join('');
    }

    if (contacts && contacts.results.length) {
        total += contacts.results.length;
        html += `<h3 style="font-size:0.9rem;color:var(--primary);margin:0.8rem 0 0.4rem">Contacts (${contacts.results.length})</h3>`;
        html += contacts.results.map(c => `
            <div class="card" onclick="showContact('${c.id}')">
                <div class="card-title">${esc(c.institution)}</div>
                <div class="contact-info">${esc(c.address)}</div>
            </div>
        `).join('');
    }

    if (rights && rights.results.length) {
        total += rights.results.length;
        html += `<h3 style="font-size:0.9rem;color:var(--primary);margin:0.8rem 0 0.4rem">Droits (${rights.results.length})</h3>`;
        html += rights.results.map(r => `
            <div class="card" style="cursor:default">
                <div class="card-title">${esc(r.title)}</div>
                <div class="right-article">${esc(r.article)}</div>
                <div class="card-desc">${esc(r.description)}</div>
            </div>
        `).join('');
    }

    if (faq && faq.results.length) {
        total += faq.results.length;
        html += `<h3 style="font-size:0.9rem;color:var(--primary);margin:0.8rem 0 0.4rem">FAQ (${faq.results.length})</h3>`;
        html += faq.results.map(f => `
            <div class="card faq-card">
                <div class="faq-question">${esc(f.question)}</div>
                <div class="faq-answer">${esc(f.answer)}</div>
            </div>
        `).join('');
    }

    if (total === 0) {
        html += '<div class="empty-state">Aucun resultat pour cette recherche.</div>';
    }

    results.innerHTML = html;
}

function filterByCategory(cat) {
    // Clear category cache to reload
    delete cache[`/procedures?category=${encodeURIComponent(cat)}`];
    switchTab('procedures');
    loadProcedures(cat);
}

function closeDetail(event) {
    if (event && event.target !== document.getElementById('detailOverlay')) return;
    document.getElementById('detailOverlay').classList.remove('open');
}

function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// Handle enter key in search
document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
});

// Initial load
loadStats();
</script>
