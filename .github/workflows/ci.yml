# CI/CD pipeline (GitHub Actions) for IAGov

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install markdownlint-cli
        run: pip install markdownlint-cli
      - name: Lint markdown files
        run: markdownlint "**/*.md"

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker.
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: |
          docker build -t iagov/app:latest .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
